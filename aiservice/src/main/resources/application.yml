spring:
  application:
   name: ai-service
  mongodb:
    uri: mongodb://localhost:27017/fitnessRecommendations
    database: fitnessRecommendations
  cloud:
    client:
      hostname: localhost
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8082

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

gemini:
  api:
    key: ${GEMINI_API_KEY}